services:
  mod-db:
    image: postgres:16-alpine   # or postgres:15-alpine, stay recent but stable
    container_name: mod-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: mod
      POSTGRES_USER: mod_user
      POSTGRES_PASSWORD: $MOD_DB_PASSWORD
    volumes:
      - wiki-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d   # ← this automatically runs your .sql
    ports:
      - "5434:5434"   # expose to host so you can connect with pgAdmin, DBeaver, etc.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mod_user -d mod"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mod-data:
